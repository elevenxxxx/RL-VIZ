<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/ink-theme.css" />
    <title>Chinese Chess RL Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script type="module" src="/src/envs/chess/ui.js"></script>
    <style>
        body {
            display: flex;
            overflow-x: hidden;
            overflow-y: auto;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            padding: 24px;
        }

        #graph {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
        }

        #graph-container {
            width: min(1180px, 100%);
            min-height: 0;
        }

        #graph-container:empty {
            display: none;
        }

        #show {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 24px;
            position: relative;
            padding: 24px;
            border-radius: 28px;
            background: var(--ink-panel);
            border: 1px solid var(--ink-border);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(12px);
        }

        #game {
            height: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            border-radius: 24px;
            padding: 24px;
            background: rgba(10, 58, 65, 0.56);
            border: 1px solid rgba(108, 214, 203, 0.14);
        }

        #controls {
            width: 316px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border-radius: 24px;
            background: var(--ink-panel-strong);
            border: 1px solid var(--ink-border);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(12px);
        }

        #training-status {
            margin-top: 2px;
            padding: 16px;
            border-radius: 20px;
            background: rgba(10, 58, 65, 0.72);
            border: 1px solid rgba(108, 214, 203, 0.14);
            color: var(--ink-card-text);
        }

        #training-status h3 {
            margin: 0 0 8px;
            font-size: 20px;
            font-weight: 650;
            color: var(--ink-heading-secondary);
        }

        .training-status__headline {
            margin: 0 0 14px;
            font-size: 13px;
            color: var(--ink-copy-soft);
            line-height: 1.6;
        }

        .training-status__notice {
            min-height: 20px;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--jade);
        }

        .training-status__grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .training-status__progress {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            background: rgba(93, 207, 201, 0.14);
            overflow: hidden;
            margin-bottom: 14px;
            border: 1px solid rgba(108, 214, 203, 0.16);
        }

        .training-status__progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--jade) 0%, var(--critic) 100%);
            transition: width 0.18s ease-out;
        }

        .training-status__item {
            display: grid;
            gap: 6px;
            padding: 12px;
            border-radius: 16px;
            background: var(--ink-card-light);
            border: 1px solid rgba(108, 214, 203, 0.18);
        }

        .training-status__label {
            font-size: 12px;
            letter-spacing: 0.04em;
            color: var(--ink-card-text-soft);
        }

        .training-status__value {
            font-size: 18px;
            font-weight: 700;
            color: var(--ink-card-text);
        }

        #board {
            max-width: 100%;
            background: #dec28c;
            border: 1px solid rgba(60, 70, 60, 0.12);
            border-radius: 18px;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.14);
        }

        button {
            width: 100%;
        }

        #controls > button {
            color: var(--ink-text);
            background: rgba(10, 58, 65, 0.9);
            border-color: rgba(108, 214, 203, 0.24);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
        }

        #controls > button:hover:not(:disabled) {
            color: #072f35;
            background: var(--jade);
            border-color: var(--ink-border-strong);
        }

        @media (max-width: 1100px) {
            #show {
                flex-direction: column;
            }

            #controls {
                width: 100%;
            }

            #game {
                min-height: 720px;
            }
        }
    </style>
</head>

<body>
<div id="show">
    <div id="game">
        <canvas id="board" width="600" height="670"></canvas>
    </div>

    <div id="controls">
        <button id="resetBtn">重置</button>
        <button id="trainBtn">训练模型</button>
        <button id="testBtn">评估模型</button>
        <button id="drawGraphBtn">测试绘图</button>

        <div id="training-status">
            <h3>训练状态</h3>
            <p class="training-status__headline">实时展示训练进度、损失变化与主要诊断指标，帮助判断 PPO 是否稳定运行。</p>
            <div id="trainingNotice" class="training-status__notice">当前未训练。</div>
            <div class="training-status__progress">
                <div id="statusProgressBar" class="training-status__progress-bar"></div>
            </div>
            <div class="training-status__grid">
                <div class="training-status__item"><span class="training-status__label">当前状态</span><span id="statusState" class="training-status__value">Idle</span></div>
                <div class="training-status__item"><span class="training-status__label">Episode</span><span id="statusEpisode" class="training-status__value">0 / 0</span></div>
                <div class="training-status__item"><span class="training-status__label">进度</span><span id="statusProgress" class="training-status__value">0%</span></div>
                <div class="training-status__item"><span class="training-status__label">当前 Reward</span><span id="statusReward" class="training-status__value">--</span></div>
                <div class="training-status__item"><span class="training-status__label">Actor Loss</span><span id="statusActorLoss" class="training-status__value">--</span></div>
                <div class="training-status__item"><span class="training-status__label">Critic Loss</span><span id="statusCriticLoss" class="training-status__value">--</span></div>
                <div class="training-status__item"><span class="training-status__label">Actor Delta</span><span id="statusActorDelta" class="training-status__value">--</span></div>
                <div class="training-status__item"><span class="training-status__label">Ratio Mean</span><span id="statusRatioMean" class="training-status__value">--</span></div>
                <div class="training-status__item"><span class="training-status__label">已耗时</span><span id="statusElapsed" class="training-status__value">00:00</span></div>
                <div class="training-status__item"><span class="training-status__label">预计剩余 ETA</span><span id="statusEta" class="training-status__value">--:--</span></div>
            </div>
        </div>
    </div>

</div>
<div id="graph">
    <div id="graph-container"></div>
</div>
<div id="episode-viewer-root"></div>

<script type="module">
    import { reset, train, test, drawGraph } from "/src/envs/chess/ui.js";
    document.getElementById('resetBtn').addEventListener('click', reset);
    document.getElementById('trainBtn').addEventListener('click', train);
    document.getElementById('testBtn').addEventListener('click', test);
    document.getElementById('drawGraphBtn').addEventListener('click', drawGraph);
</script>

</body>

</html>
