<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/ink-theme.css" />
    <title>Maze RL Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- <script type="module" src="/src/envs/maze/maze.js"></script> -->
    <style>
        body {
            display: grid;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100vh;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            gap: 14px;
            align-content: start;
            justify-items: center;
        }

        #cfgQValue {
            position: absolute;
            right: 230px;
            top: 10px;
            width: 320px;
            height: 300px;
            overflow-y: auto;
        }

        #cfgQValue::-webkit-scrollbar {
            width: 8px;
        }

        #cfgQValue::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #cfgQValue::-webkit-scrollbar-thumb {
            background: #89ccf4 rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #cfgQValue {
            scrollbar-width: thin;
            scrollbar-color: #89ccf4 rgba(255, 255, 255, 0.05);
        }

        #show {
            display: grid;
            grid-template-columns: 1fr;
            align-items: stretch;
            width: 100%;
            gap: 16px;
            position: relative;
            padding: 20px;
            border-radius: 28px;
            background: var(--ink-panel);
            border: 1px solid var(--ink-border);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(12px);
            width: min(1240px, 100%);
            margin: 0 auto;
        }

        #maze_info {
            position: absolute;
            top: 30px;
            left: 26px;
            font-size: 18px;
            color: var(--gold);
            letter-spacing: 0.04em;
        }

        #game {
            min-height: 0;
            padding: 80px 20px 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-width: 0;
            width: 100%;
            position: relative;
            overflow: auto;
            box-sizing: border-box;
            justify-self: stretch;
            border-radius: 24px;
            background: rgba(10, 58, 65, 0.56);
            border: 1px solid rgba(108, 214, 203, 0.14);
        }

        #game canvas {
            display: block;
            width: auto !important;
            height: auto !important;
            max-width: 100%;
            max-height: calc(100vh - 180px);
        }

        #maze_tooltip {
            position: absolute;
            background: rgba(8, 47, 53, 0.94);
            color: var(--ink-text);
            padding: 10px 12px;
            border-radius: 12px;
            pointer-events: none;
            display: none;
            max-width: 450px;
            max-height: 300px;
            z-index: 999;

            word-wrap: break-word;
            /* 允许长单词换行 */
            word-break: break-word;
            /* 在任意位置断行 */
            white-space: normal;
            /* 正常换行（默认值） */
            overflow-y: auto;
            /* 内容超出时显示滚动条 */
            line-height: 1.5;
            /* 行高，提升可读性 */
        }

        #controls {
            width: 100%;
            max-width: none;
            padding: 22px;
            display: grid;
            gap: 14px;
            border-radius: 24px;
            background: var(--ink-panel-strong);
            border: 1px solid var(--ink-border);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(12px);
            box-sizing: border-box;
        }

        .controls-grid {
            display: grid;
            gap: 12px;
        }

        .controls-grid--actions {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .controls-grid--settings {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .controls-section-title {
            margin: 2px 2px 0;
            font-size: 12px;
            color: var(--ink-heading-secondary);
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        #maze_explainer {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            gap: 10px;
            padding: 18px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            border-radius: 24px;
            background: var(--ink-panel);
            box-shadow: var(--shadow-soft);
            width: min(1240px, 100%);
            margin: 0 auto;
            box-sizing: border-box;
        }

        #maze_explainer_text {
            width: min(960px, 100%);
            font-size: 22px;
            margin: 0 auto;
        }

        #QTable {
            position: absolute;
            left: 10px;
            top: 80px;
            background: rgba(8, 47, 53, 0.88);
            color: var(--ink-text);
            border-radius: 16px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(6px);
        }

        #maze_formula {
            position: absolute;
            left: 10px;
            top: 10px;
            background: rgba(8, 47, 53, 0.88);
            color: var(--ink-text);
            border-radius: 16px;
            padding: 6px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(6px);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .maze_v {
            position: absolute;

            background: rgba(20, 20, 30, 0.85);
            color: #9ecbff;
            width: 180px;

            border-radius: 10px;
            padding: 6px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
        }

        #cfgQagent_s {
            top: 300px;
            left: 10px;
        }

        #cfgQagent_a {
            top: 340px;
            left: 10px;
        }

        #cfgQagent_r {
            top: 380px;
            left: 10px;
        }

        #cfgQagent_qs {
            top: 420px;
            left: 10px;
        }

        #QTable table {
            border-collapse: collapse;
        }

        #QTable th,
        #QTable td {
            padding: 6px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #QTable th {
            color: var(--jade);
            font-weight: 600;
        }

        #QTable td {
            font-family: "Consolas", monospace;
            min-width: 70px;
        }

        /* hover */
        #QTable tr:hover td {
            background: rgba(95, 158, 160, 0.05);
        }

        #QTable tr:first-child th {
            border-bottom: 2px solid rgba(95, 158, 160, 0.25);
        }

        button {
            width: 100%;
        }

        .controls-grid--actions button {
            color: var(--ink-text);
            background: rgba(8, 56, 63, 0.96);
            border-color: rgba(108, 214, 203, 0.28);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
        }

        .controls-grid--actions button:hover:not(:disabled) {
            color: #072f35;
            background: var(--jade);
            border-color: var(--ink-border-strong);
        }

        .controls-grid--actions button#trainBtn,
        .controls-grid--actions button#stepTrainBtn,
        .controls-grid--actions button#testBtn {
            color: var(--ink-text);
            background: rgba(8, 56, 63, 0.96);
            border-color: rgba(108, 214, 203, 0.28);
        }

        .controls-grid--actions #stopBtn {
            color: #ffffff;
            background: var(--cinnabar);
            border-color: rgba(199, 91, 91, 0.18);
        }

        .controls-grid--actions #stopBtn:hover:not(:disabled) {
            color: #ffffff;
            background: #b84c4c;
        }

        #maze_steps {
            position: absolute;
            top: 96px;
            right: 18px;
            max-width: min(260px, 24vw);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            justify-content: flex-end;
            font-size: 20px;
            z-index: 20;
            pointer-events: none;
        }

        .step-container {
            position: relative;
            padding: 12px 14px;
            border-radius: 12px;

            background: rgba(20, 22, 30, 0.75);
            border: 1px solid rgba(120, 160, 255, 0.15);

            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.35);
            font-size: 18px;
            width: 100%;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .flow-title {
            color: #cfe3ff;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* ===== 主线 ===== */
        .flow-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 18px;
        }

        .flow-node {
            position: relative;

            padding: 8px 12px;
            border-radius: 10px;

            font-size: 17px;
            color: #e4edf4;

            border: 1px solid rgba(255, 255, 255, 0.06);

            transition: all 0.25s ease;

            cursor: pointer;
            width: 90%;
        }

        .flow-node:hover {
            transform: translateX(4px) scale(1.02);
            color: #66ea7a;
            border-color: rgba(120, 170, 255, 0.35);
        }

        .flow-node.active {
            color: #66ea7a;

            box-shadow: 0 0 14px rgba(76, 139, 245, 0.5);
        }

        .flow-node.done {
            color: #66ea7a;

        }

        .flow-node::after {
            content: "↓ ↓ ↓";
            position: absolute;

            left: 50%;
            bottom: -18px;

            transform: translateX(-50%);

            font-size: 20px;
            color: rgba(255, 255, 255, 0.25);
        }

        .flow-node.active::after {
            color: #66ea7a;
            animation: flowDown 0.8s linear infinite;
        }


        @keyframes flowDown {
            0% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(0);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(6px);
            }
        }

        /* 最后一个没有箭头 */
        .flow-node:last-child::after {
            display: none;
        }

        @keyframes flow {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 16px 0;
            }
        }

        .cfgRow {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(60, 70, 60, 0.08);
            color: var(--ink-card-text-soft);
        }

        .cfgRow label {
            font-size: 13px;
            color: var(--ink-card-text-soft);
        }

        .cfgRow input[type="number"] {
            width: 100%;
            min-width: 0;
        }

        #graph {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 0;
        }

        #graph-container {
            width: min(1180px, 100%);
            min-height: 0;
        }

        #graph-container:empty {
            display: none;
        }

        #episode-viewer-root-maze {
            width: min(1240px, 100%);
            margin: 0 auto;
        }

        @media (max-width: 1180px) {
            #maze_explainer_text {
                width: 100%;
            }

            #game {
                padding: 72px 12px 20px;
            }

            #game canvas {
                max-width: 100%;
                max-height: min(70vh, 900px);
            }

            #maze_steps {
                top: 88px;
                right: 12px;
                max-width: 220px;
            }

            .controls-grid--settings {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 780px) {
            body {
                padding: 12px;
            }

            #show {
                padding: 12px;
                gap: 16px;
            }

            #game {
                padding: 64px 8px 16px;
            }

            #maze_info {
                top: 20px;
                left: 16px;
            }

            #maze_steps {
                position: static;
                width: 100%;
                max-width: none;
                margin-top: 12px;
                justify-content: center;
                pointer-events: auto;
            }

            .step-container {
                max-width: 100%;
            }

            .controls-grid--actions,
            .controls-grid--settings {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="show">
        <div id="game">
            <div id="maze_info">
                <span id="currentEpisode">episode: 0</span>

            </div>
            <table id="QTable"></table>
            <span id="maze_formula"></span>
            <span class="maze_v" id="cfgQagent_s">s(当前状态): 0,0</span>
            <span class="maze_v" id="cfgQagent_a">a(当前动作): 0</span>
            <span class="maze_v" id="cfgQagent_r">r(即时奖励): 0</span>
            <span class="maze_v" id="cfgQagent_qs">s'(下一状态): 0,0</span>
            <textarea class="maze_v" id="cfgQValue"></textarea>
            <span id="maze_tooltip"></span>
            <div id="maze_steps">
                <div id="maze_Steps" class="step-container"></div>
            </div>
        </div>

        <div id="controls">
            <div class="controls-section-title">Actions</div>
            <div class="controls-grid controls-grid--actions">
                <button id="resetBtn">复位智能体</button>
                <button id="resetAgentBtn">清空智能体</button>
                <button id="fresh">刷新页面</button>
                <button id="trainBtn">训练</button>
                <button id="stepTrainBtn">训练一轮</button>
                <button id="stopBtn">中止训练</button>
                <button id="stepBtn">下一步</button>
                <button id="stepRenderBtn">分阶段步进</button>
                <button id="testBtn">测试</button>
                <button id="debugBtn">打印Q表</button>
                <button id="restoreBtn">恢复默认设置</button>
            </div>

            <div class="controls-section-title">Settings</div>
            <div class="controls-grid controls-grid--settings">
            <div class="cfgRow">
                <label>显示训练过程动画</label>
                <input type="checkbox" id="cfgRenderTrain" checked />
            </div>

            <div class="cfgRow">
                <label>步进时更新Q表</label>
                <input type="checkbox" id="cfgStepMode" />
            </div>

            <div class="cfgRow">
                <label>流型渲染</label>
                <input type="checkbox" id="cfgHighRender" />
            </div>

            <div class="cfgRow">
                <label>显示路径</label>
                <input type="checkbox" id="cfgShowPath" />
            </div>

            <div class="cfgRow">
                <label>显示格子深度</label>
                <input type="checkbox" id="cfgShowHeatmap" />
            </div>

            <div class="cfgRow">
                <label>显示标记</label>
                <input type="checkbox" id="cfgShowMarkers" />
            </div>

            <div class="cfgRow">
                <label>显示调试信息</label>
                <input type="checkbox" id="cfgConsole" />
            </div>

            <div class="cfgRow">
                <label>最大训练轮数</label>
                <input type="number" id="cfgEpisodes" value="150" />
            </div>

            <div class="cfgRow">
                <label>每轮最大步数</label>
                <input type="number" id="cfgMaxSteps" value="400" />
            </div>

            <div class="cfgRow">
                <label>渲染速度（ms/步）</label>
                <input type="number" id="cfgRenderSpeed" value="10" />
            </div>

            <div class="cfgRow">
                <label>快速渲染间隔（轮）</label>
                <input type="number" id="cfgEpRenderInterval" value="20" />
            </div>

            <div class="cfgRow">
                <label>迷宫列数(必须奇数)</label>
                <input type="number" id="cfgCols" value="21" />
            </div>

            <div class="cfgRow">
                <label>迷宫行数(必须奇数)</label>
                <input type="number" id="cfgRows" value="21" />
            </div>

            <div class="cfgRow">
                <label>α 学习率</label>
                <input type="number" step="0.01" id="cfgAlpha" value="0.1" />
            </div>

            <div class="cfgRow">
                <label>γ 折扣因子</label>
                <input type="number" step="0.01" id="cfgGamma" value="0.95" />
            </div>

            <div class="cfgRow">
                <label>ε 探索因子</label>
                <input type="number" step="0.01" id="cfgEpsilon" value="0.1" />
            </div>
            </div>

        </div>


    </div>
    <div id="maze_explainer">
        <div id="maze_explainer_text">

        </div>
    </div>
    <div id="graph">
        <div id="graph-container"></div>
    </div>
    <div id="episode-viewer-root-maze"></div>

    <script type="module">
        import {
            reset, train, test, SingleStep, debug, resetAgent, fresh, applyConfig, stepTrainEpisode, config, stopTrain,
            restore, watch, stepRender
        } from "/src/envs/maze/maze.js";
        import { trainStepsInfo, testStepsInfo, initFlow, trainSteps, testSteps } from "/src/envs/maze/steps.js";

        document.getElementById('resetBtn').addEventListener('click', reset);
        document.getElementById('trainBtn').addEventListener('click', train);
        document.getElementById('testBtn').addEventListener('click', test);
        document.getElementById('stepBtn').addEventListener('click', SingleStep);
        document.getElementById('debugBtn').addEventListener('click', debug);

        document.getElementById('resetAgentBtn').addEventListener('click', resetAgent);
        document.getElementById('fresh').addEventListener('click', fresh);
        document.getElementById('stepTrainBtn').addEventListener('click', stepTrainEpisode);
        document.getElementById('stepRenderBtn').addEventListener('click', stepRender);
        document.getElementById('stopBtn').addEventListener('click', stopTrain);
        document.getElementById('restoreBtn').addEventListener('click', restore);

        document.getElementById('cfgConsole').addEventListener('change', ConsoleUpdate);

        const episodeEl = document.getElementById("currentEpisode");

        function updateViewConfig() {
            document.getElementById('cfgRenderTrain').checked = config.renderTrain;
            document.getElementById('cfgStepMode').checked = config.stepMode;
            document.getElementById('cfgHighRender').checked = config.high_render;
            document.getElementById('cfgShowPath').checked = config.draw_current_path || config.draw_paths;
            document.getElementById('cfgShowMarkers').checked = config.draw_policy;
            document.getElementById('cfgShowHeatmap').checked = config.draw_heatmap;
            document.getElementById('cfgEpisodes').value = config.trainEpisodes;
            document.getElementById('cfgMaxSteps').value = config.maxSteps;
            document.getElementById('cfgRenderSpeed').value = config.renderSpeed;
            document.getElementById('cfgCols').value = config.cols;
            document.getElementById('cfgRows').value = config.rows;
            document.getElementById('cfgAlpha').value = config.alpha;
            document.getElementById('cfgGamma').value = config.gamma;
            document.getElementById('cfgEpsilon').value = config.epsilon;
            document.getElementById("currentEpisode").textContent = `episode: ${config.currentEpisode}`;
            document.getElementById('cfgConsole').checked = true;
            ConsoleUpdate();
            ///refreshSteps();
            initFlow(config.stepMode ? "train" : "test");
        }

        watch("currentEpisode", (val) => {
            episodeEl.textContent = `episode: ${val}`;
        });
        watch("stepMode", (val) => {
            initFlow(val ? "train" : "test");
            return;
            console.log("stepMode", val);
            if (val) {
                let flow_nodes = document.querySelectorAll(".flow_node");
                for (let i = 0; i < flow_nodes.length; i++) {
                    flow_nodes[i].textContent = trainSteps[i];
                }

                // flow_nodes[2].style.display = "block";
            } else {
                let flow_nodes = document.querySelectorAll(".flow-node");
                for (let i = 0; i < flow_nodes.length; i++) {
                    flow_nodes[i].textContent = testSteps[i];
                }
                if (flow_nodes[2]) {
                    flow_nodes[2].style.display = "none";
                }
            }
        });
        watch("Qagent_s", (val) => {
            document.getElementById("cfgQagent_s").textContent = `s(当前状态): ${val}`;
        });
        watch("Qagent_a", (val) => {
            document.getElementById("cfgQagent_a").textContent = `a(当前动作): ${val}`;
        });
        watch("Qagent_r", (val) => {
            document.getElementById("cfgQagent_r").textContent = `r(即时奖励): ${val.toFixed(3)}`;
        });
        watch("Qagent_qs", (val) => {
            document.getElementById("cfgQagent_qs").textContent = `s'(下一状态): ${val}`;
        });

        function ConsoleUpdate() {
            let is_show = document.getElementById("cfgConsole").checked;
            if (is_show) {
                document.getElementById("cfgQagent_s").style.display = "block";
                document.getElementById("cfgQagent_a").style.display = "block";
                document.getElementById("cfgQagent_r").style.display = "block";
                document.getElementById("cfgQagent_qs").style.display = "block";
                document.getElementById("QTable").style.display = "block";
                //document.getElementById("cfgQValue").style.display = "block";
                document.getElementById("maze_formula").style.display = "flex";
                document.getElementById("maze_steps").style.display = "flex";
            } else {
                document.getElementById("cfgQagent_s").style.display = "none";
                document.getElementById("cfgQagent_a").style.display = "none";
                document.getElementById("cfgQagent_r").style.display = "none";
                document.getElementById("cfgQagent_qs").style.display = "none";
                document.getElementById("QTable").style.display = "none";
                document.getElementById("cfgQValue").style.display = "none";
                document.getElementById("maze_formula").style.display = "none";
                document.getElementById("maze_steps").style.display = "none";
            }
        }

        const tooltip = document.getElementById("maze_tooltip");

        updateViewConfig();
        applyConfig();

        const explainerEl = document.getElementById("maze_explainer_text");
        const formulaEl = document.getElementById("maze_formula");
        formulaEl.innerHTML = `
    $$Q(s, a)=Q(s, a)+\\alpha \\Big[ r + \\gamma \\max_{a'} Q(s', a') - Q(s, a) \\Big]$$
`;

        explainerEl.innerHTML = `
  <h2>Q-Learning </h2>

  <p>
    Q-Learning 是一种经典的 <b>无模型强化学习算法</b>，
    属于 <b>时序差分学习（Temporal Difference Learning）</b>，
    通过在每一步与环境交互中逐步学习、寻找最优策略。</b>
    常用于迷宫、棋类游戏等场景。
  </p>

  <h3>核心更新公式</h3>

  <p>
   $$Q(s, a) = Q(s, a) + \\alpha \\Big[ r + \\gamma \\max_{a'} Q(s', a') - Q(s, a) \\Big]$$
  </p>
  <p>其中：</p>

  <ul>
    <li><b>Q(s, a)</b>：状态-动作价值函数</li>
    <li><b>\\(\\alpha\\)</b>：学习率</li>
    <li><b>\\(\\gamma\\)</b>：折扣因子</li>
    <li><b>r</b>：即时奖励</li>
    <li><b>\\(s'\\)</b>：下一状态</li>
  </ul>

  <h3>算法特点</h3>

  <ul>
    <li> 无需环境模型</li>
    <li> 离线/在线均可学习(主要用于在线学习环境)</li>
    <li> 适用于离散状态空间、不适合过大或者连续状态的情景</li>
  </ul>

  <h3>算法流程</h3>

  <h4>初始化</h4>

  <ol>
    <li>初始化 Q 表 \\( Q(s, a) = 0 \\) 和环境</li>
    <li>设定学习率 \\( \\alpha \\)、折扣因子 \\( \\gamma \\)、探索率 \\( \\epsilon \\)（epsilon-greedy）</li>
  </ol>

  <h4>训练</h4>

  <ol>

    <li>
      <b>使用 ε-greedy 策略选择动作：</b><br/>
      - 以 \\( \\epsilon \\) 概率随机选择动作（探索）<br/>
      - 以 \\( 1 - \\epsilon \\) 概率选择
      \\( \\arg\\max_a Q(s, a) \\)（利用）
    </li>

    <li>智能体执行动作 \\( a \\)，进入新状态 \\( s' \\)，获得奖励 \\( r \\)</li>

    <li>
    更新 Q 值：
      $$
      Q(s, a) = Q(s, a) + \\alpha (r + \\gamma \\max_{a'} Q(s', a') - Q(s, a))
      $$
    </li>

    <li>重复直到 episode 结束</li>
  </ol>

  <h4>测试</h4>

  <ol>
    <li>始终选择 \\( \\arg\\max_a Q(s, a) \\)/设定\\( \\epsilon = 0 \\)（一般都这么做，但也可以不关）</li>
    <li>智能体执行动作 \\( a \\)，进入新状态 \\( s' \\)，获得奖励 \\( r \\)，不更新 Q 表</li>
  </ol>


`;

        window.MathJax.typesetPromise();

        function refreshSteps() {
            const flow_nodes = document.querySelectorAll(".flow-node");
            if (config.stepMode) {
                for (let i = 0; i < flow_nodes.length; i++) {
                    flow_nodes[i].textContent = node.dataset.index;
                    tooltip.innerHTML = trainStepsInfo[i];
                    flow_nodes[i].style.display = "block";
                }
            } else {
                for (let i = 0; i < flow_nodes.length; i++) {
                    flow_nodes[i].textContent = node.dataset.index;
                    tooltip.innerHTML = testStepsInfo[i];
                    if (i > testSteps.length - 1) {
                        flow_nodes[i].style.display = "none";
                    }
                    else {
                        flow_nodes[i].style.display = "block";
                    }
                }

            }
        }

        document.addEventListener("mousemove", async (e) => {
            const node = e.target.closest(".flow-node");
            if (!node) {
                tooltip.style.display = "none";
                return;
            }

            if (config.stepMode) {
                //node.textContent = node.dataset.index;
                tooltip.innerHTML = trainStepsInfo[node.dataset.index];
            } else {
                //node.textContent = node.dataset.index;
                tooltip.innerHTML = testStepsInfo[node.dataset.index];
            }

            tooltip.style.left = (e.pageX - 150) + "px";
            tooltip.style.top = (e.pageY - 50) + "px";

            tooltip.style.display = "block";
            MathJax.typesetPromise([tooltip]);//渲染数学公式
        });
    </script>
