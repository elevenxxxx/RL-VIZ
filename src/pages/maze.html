<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Maze RL Environment</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- <script type="module" src="/src/envs/maze/maze.js"></script> -->
    <style>
        body {
            margin: 0;
            display: flex;
            overflow-x: auto;
            overflow-y: auto;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        #cfgQValue {
            position: absolute;
            right: 23px;
            top: 10px;
            width: 320px;
            height: 300px;
            overflow-y: auto;
        }

        #cfgQValue::-webkit-scrollbar {
            width: 8px;
        }

        #cfgQValue::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #cfgQValue::-webkit-scrollbar-thumb {
            background: #89ccf4 rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        #cfgQValue {
            scrollbar-width: thin;
            scrollbar-color: #89ccf4 rgba(255, 255, 255, 0.05);
        }

        #show {
            flex: 1;
            margin: 0;
            display: flex;
            width: 100%;
            position: relative;
        }

        #maze_info {
            position: absolute;
            top: 30px;
            font-size: 20px;
        }

        #game {
            min-height: 800px;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;

        }

        #maze_tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 8px;
            border-radius: 6px;
            pointer-events: none;
            display: none;
            max-width: 400px;
            max-height: 300px;
            z-index: 999;
        }

        #controls {
            width: 200px;
            padding: 10px;
        }

        #maze_explainer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #maze_explainer_text {
            width: 70%;
            font-size: 24px;
        }

        #QTable {
            position: absolute;
            left: 10px;
            top: 80px;

            background: rgba(20, 20, 30, 0.85);
            color: #e6e6e6;

            border-radius: 10px;
            padding: 10px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
        }

        #maze_formula {
            position: absolute;
            left: 10px;
            top: 10px;
            background: rgba(20, 20, 30, 0.85);
            color: #e6e6e6;

            border-radius: 10px;
            padding: 6px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);
            height: 50px;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        .maze_v {
            position: absolute;

            background: rgba(20, 20, 30, 0.85);
            color: #9ecbff;
            width: 180px;

            border-radius: 10px;
            padding: 6px;

            font-size: 16px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(6px);

            display: flex;
            align-items: center;

        }

        #cfgQagent_s {
            top: 300px;
            left: 10px;
        }

        #cfgQagent_a {
            top: 340px;
            left: 10px;
        }

        #cfgQagent_r {
            top: 380px;
            left: 10px;
        }

        #cfgQagent_qs {
            top: 420px;
            left: 10px;
        }

        #QTable table {
            border-collapse: collapse;
        }

        #QTable th,
        #QTable td {
            padding: 6px 10px;
            text-align: center;

            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #QTable th {
            color: #9ecbff;
            font-weight: 600;
        }

        #QTable td {
            font-family: "Consolas", monospace;
            min-width: 70px;
        }

        /* hover */
        #QTable tr:hover td {
            background: rgba(255, 255, 255, 0.05);
        }

        /* 表头强化 */
        #QTable tr:first-child th {
            border-bottom: 2px solid rgba(120, 180, 255, 0.5);
        }

        button {
            width: 100%;
            margin-bottom: 10px;
        }

        #maze_steps {
            position: absolute;
            bottom: 100px;
            right: 230px;

            /* z-index: 999; */

            backdrop-filter: blur(10px);
            border-radius: 12px;
            width: 200px;
            display: flex;
            justify-content: center;
        }

        .step-container {
            padding: 12px 14px;
            border-radius: 12px;

            background: rgba(20, 22, 30, 0.75);
            border: 1px solid rgba(120, 160, 255, 0.15);

            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.35);
        }

        .flow-title {
            color: #cfe3ff;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        /* ===== 主线 ===== */
        .flow-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 18px;
        }

        .flow-node {
            position: relative;

            padding: 8px 12px;
            border-radius: 10px;

            font-size: 13px;
            color: #aab4c5;

            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);

            transition: all 0.25s ease;

            cursor: pointer;
        }

        .flow-node:hover {
            transform: translateX(4px) scale(1.02);
            background: rgba(120, 170, 255, 0.12);
            color: #ffffff;
            border-color: rgba(120, 170, 255, 0.35);
        }

        .flow-node.active {
            color: #fff;
            background: linear-gradient(135deg, #4c8bf5, #6ea8ff);
            box-shadow: 0 0 14px rgba(76, 139, 245, 0.5);
        }

        .flow-node.done {
            color: #dbe7ff;
            background: rgba(76, 139, 245, 0.18);
        }

        /* ===== >>>>> 动态流动箭头 ===== */
        .flow-node::after {
            content: "↓";
            position: absolute;

            left: 50%;
            bottom: -18px;

            transform: translateX(-50%);

            font-size: 16px;
            color: rgba(255, 255, 255, 0.25);
        }

        /* active时箭头动画 */
        .flow-node.active::after {
            color: #4c8bf5;
            animation: flowDown 0.8s linear infinite;
        }


        @keyframes flowDown {
            0% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(0);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.2;
                transform: translateX(-50%) translateY(6px);
            }
        }

        /* 最后一个没有箭头 */
        .flow-node:last-child::after {
            display: none;
        }

        @keyframes flow {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 16px 0;
            }
        }
    </style>
</head>

<body>
    <div id="show">
        <div id="game">
            <div id="maze_info">
                <span id="currentEpisode">episode: 0</span>

            </div>
            <table id="QTable"></table>
            <span id="maze_formula"></span>
            <span class="maze_v" id="cfgQagent_s">s(当前状态): 0,0</span>
            <span class="maze_v" id="cfgQagent_a">a(当前动作): 0</span>
            <span class="maze_v" id="cfgQagent_r">r(即时奖励): 0</span>
            <span class="maze_v" id="cfgQagent_qs">s'(下一状态): 0,0</span>
            <textarea class="maze_v" id="cfgQValue"></textarea>
            <span id="maze_tooltip"></span>
            <div id="maze_steps">
                <div id="maze_Steps" class="step-container"></div>
            </div>
        </div>

        <div id="controls">
            <button id="resetBtn">重置所有</button>
            <button id="resetAgentBtn">重置智能体</button>
            <button id="fresh">刷新页面/刷新地图</button>

            <button id="trainBtn">训练</button>
            <button id="stepTrainBtn">训练一轮</button>
            <button id="stopBtn">中止训练</button>
            <button id="stepBtn">下一步</button>
            <button id="stepRenderBtn">分阶段步进</button>
            <button id="testBtn">测试</button>

            <button id="debugBtn">打印Q表</button>
            <button id="restoreBtn">恢复默认设置</button>

            <div class="cfgRow">
                <label>显示训练过程动画</label>
                <input type="checkbox" id="cfgRenderTrain" checked />
            </div>

            <div class="cfgRow">
                <label>步进时更新Q表</label>
                <input type="checkbox" id="cfgStepMode" />
            </div>

            <div class="cfgRow">
                <label>流型渲染</label>
                <input type="checkbox" id="cfgHighRender" />
            </div>

            <div class="cfgRow">
                <label>显示路径</label>
                <input type="checkbox" id="cfgShowPath" />
            </div>

            <div class="cfgRow">
                <label>显示格子深度</label>
                <input type="checkbox" id="cfgShowHeatmap" />
            </div>

            <div class="cfgRow">
                <label>显示标记</label>
                <input type="checkbox" id="cfgShowMarkers" />
            </div>

            <div class="cfgRow">
                <label>显示调试信息</label>
                <input type="checkbox" id="cfgConsole" />
            </div>

            <div class="cfgRow">
                <label>最大训练轮数</label>
                <input type="number" id="cfgEpisodes" value="150" />
            </div>

            <div class="cfgRow">
                <label>每轮最大步数</label>
                <input type="number" id="cfgMaxSteps" value="400" />
            </div>

            <div class="cfgRow">
                <label>渲染速度（ms/步）</label>
                <input type="number" id="cfgRenderSpeed" value="10" />
            </div>

            <div class="cfgRow">
                <label>快速渲染间隔（轮）</label>
                <input type="number" id="cfgEpRenderInterval" value="20" />
            </div>

            <div class="cfgRow">
                <label>迷宫列数(必须奇数)</label>
                <input type="number" id="cfgCols" value="21" />
            </div>

            <div class="cfgRow">
                <label>迷宫行数(必须奇数)</label>
                <input type="number" id="cfgRows" value="21" />
            </div>

            <div class="cfgRow">
                <label>α 学习率</label>
                <input type="number" step="0.01" id="cfgAlpha" value="0.1" />
            </div>

            <div class="cfgRow">
                <label>γ 折扣因子</label>
                <input type="number" step="0.01" id="cfgGamma" value="0.95" />
            </div>

            <div class="cfgRow">
                <label>ε 探索因子</label>
                <input type="number" step="0.01" id="cfgEpsilon" value="0.1" />
            </div>

        </div>


    </div>
    <div id="maze_explainer">

        <div id="maze_explainer_text">

        </div>
    </div>
    <div id="graph">
        <div id="graph-container"></div>
    </div>

    <script type="module">
        import {
            reset, train, test, SingleStep, debug, resetAgent, fresh, applyConfig, stepTrainEpisode, config, stopTrain,
            restore, watch, stepRender
        } from "/src/envs/maze/maze.js";

        document.getElementById('resetBtn').addEventListener('click', reset);
        document.getElementById('trainBtn').addEventListener('click', train);
        document.getElementById('testBtn').addEventListener('click', test);
        document.getElementById('stepBtn').addEventListener('click', SingleStep);
        document.getElementById('debugBtn').addEventListener('click', debug);

        document.getElementById('resetAgentBtn').addEventListener('click', resetAgent);
        document.getElementById('fresh').addEventListener('click', fresh);
        document.getElementById('stepTrainBtn').addEventListener('click', stepTrainEpisode);
        document.getElementById('stepRenderBtn').addEventListener('click', stepRender);
        document.getElementById('stopBtn').addEventListener('click', stopTrain);
        document.getElementById('restoreBtn').addEventListener('click', restore);

        document.getElementById('cfgConsole').addEventListener('change', ConsoleUpdate);

        const episodeEl = document.getElementById("currentEpisode");

        function updateViewConfig() {
            document.getElementById('cfgRenderTrain').checked = config.renderTrain;
            document.getElementById('cfgStepMode').checked = config.stepMode;
            document.getElementById('cfgHighRender').checked = config.high_render;
            document.getElementById('cfgShowPath').checked = config.draw_current_path || config.draw_paths;
            document.getElementById('cfgShowMarkers').checked = config.draw_policy;
            document.getElementById('cfgShowHeatmap').checked = config.draw_heatmap;
            document.getElementById('cfgEpisodes').value = config.trainEpisodes;
            document.getElementById('cfgMaxSteps').value = config.maxSteps;
            document.getElementById('cfgRenderSpeed').value = config.renderSpeed;
            document.getElementById('cfgCols').value = config.cols;
            document.getElementById('cfgRows').value = config.rows;
            document.getElementById('cfgAlpha').value = config.alpha;
            document.getElementById('cfgGamma').value = config.gamma;
            document.getElementById('cfgEpsilon').value = config.epsilon;
            document.getElementById("currentEpisode").textContent = `episode: ${config.currentEpisode}`;
            document.getElementById('cfgConsole').checked = true;
            ConsoleUpdate();
        }

        watch("currentEpisode", (val) => {
            episodeEl.textContent = `episode: ${val}`;
        });
        watch("Qagent_s", (val) => {
            document.getElementById("cfgQagent_s").textContent = `s(当前状态): ${val}`;
        });
        watch("Qagent_a", (val) => {
            document.getElementById("cfgQagent_a").textContent = `a(当前动作): ${val}`;
        });
        watch("Qagent_r", (val) => {
            document.getElementById("cfgQagent_r").textContent = `r(即时奖励): ${val.toFixed(3)}`;
        });
        watch("Qagent_qs", (val) => {
            document.getElementById("cfgQagent_qs").textContent = `s'(下一状态): ${val}`;
        });

        function ConsoleUpdate() {
            let is_show = document.getElementById("cfgConsole").checked;
            if (is_show) {
                document.getElementById("cfgQagent_s").style.display = "block";
                document.getElementById("cfgQagent_a").style.display = "block";
                document.getElementById("cfgQagent_r").style.display = "block";
                document.getElementById("cfgQagent_qs").style.display = "block";
                document.getElementById("QTable").style.display = "block";
                //document.getElementById("cfgQValue").style.display = "block";
                document.getElementById("maze_formula").style.display = "flex";
            } else {
                document.getElementById("cfgQagent_s").style.display = "none";
                document.getElementById("cfgQagent_a").style.display = "none";
                document.getElementById("cfgQagent_r").style.display = "none";
                document.getElementById("cfgQagent_qs").style.display = "none";
                document.getElementById("QTable").style.display = "none";
                document.getElementById("cfgQValue").style.display = "none";
                document.getElementById("maze_formula").style.display = "none";
            }
        }

        updateViewConfig();
        applyConfig();

        const explainerEl = document.getElementById("maze_explainer_text");
        const formulaEl = document.getElementById("maze_formula");
        formulaEl.innerHTML = `
    $$Q(s, a)=Q(s, a)\\alpha \\Big[ r + \\gamma \\max_{a'} Q(s', a') - Q(s, a) \\Big]$$
`;

        explainerEl.innerHTML = `
  <h2>Q-Learning 强化学习算法</h2>

  <p>
    Q-Learning 是一种经典的 <b>无模型（Model-Free）强化学习算法</b>，
    属于 <b>时序差分学习（Temporal Difference Learning）</b>，
    通过学习 <b>状态-动作价值函数 Q(s, a)</b> 来寻找最优策略。
  </p>

  <h3>一、算法核心思想</h3>

  <p>
    在环境中，智能体通过不断与环境交互：
  </p>

  <ul>
    <li>观察当前状态 \\( s \\)</li>
    <li>选择动作 \\( a \\)</li>
    <li>获得奖励 \\( r \\)</li>
    <li>转移到新状态 \\( s' \\)</li>
  </ul>

  <p>
    并通过不断更新 Q 值，使得长期回报最大化。
  </p>

  <h3>二、Q-learning 更新公式</h3>

  <p>
   $$Q(s, a) \\leftarrow Q(s, a) + \\alpha \\Big[ r + \\gamma \\max_{a'} Q(s', a') - Q(s, a) \\Big]$$
  </p>

  <h3>三、参数解释</h3>

  <ul>
    <li><b>Q(s, a)</b>：状态-动作价值函数</li>
    <li><b>\\(\\alpha\\)</b>：学习率（learning rate）</li>
    <li><b>\\(\\gamma\\)</b>：折扣因子（discount factor）</li>
    <li><b>r</b>：即时奖励</li>
    <li><b>\\(s'\\)</b>：下一状态</li>
    <li><b>\\(\\max_{a'} Q(s', a')\\)</b>：下一状态的最优预期收益</li>
  </ul>

  <h3>四、算法特征</h3>

  <ul>
    <li>✔ 无需环境模型（Model-Free）</li>
    <li>✔ 离线/在线均可学习</li>
    <li>✔ 收敛到最优策略（在满足条件下）</li>
    <li>✔ 适用于离散状态空间</li>
    <li>⚠ 不适合超大/连续状态空间（需要 DQN）</li>
  </ul>

  <h3>五、适用场景</h3>

  <ul>
    <li>迷宫路径搜索（当前项目）</li>
    <li>棋类游戏策略学习</li>
    <li>简单控制问题（GridWorld）</li>
  </ul>

  <hr />

  <h2>在当前 Maze 环境中的训练流程</h2>

  <h3>阶段一：初始化</h3>

  <ol>
    <li>初始化 Q 表 \\( Q(s, a) = 0 \\)</li>
    <li>设定学习率 \\( \\alpha \\)、折扣因子 \\( \\gamma \\)</li>
    <li>设定探索率 \\( \\epsilon \\)（epsilon-greedy）</li>
    <li>重置环境（reset agent position）</li>
  </ol>

  <h3>阶段二：训练过程（Episode Loop）</h3>

  <ol>
    <li>获取当前状态 \\( s \\)</li>

    <li>
      <b>ε-greedy 选择动作：</b><br/>
      - 以 \\( \\epsilon \\) 概率随机选择动作（探索）<br/>
      - 以 \\( 1 - \\epsilon \\) 概率选择
      \\( \\arg\\max_a Q(s, a) \\)（利用）
    </li>

    <li>执行动作 \\( a \\)，进入新状态 \\( s' \\)</li>

    <li>获得奖励 \\( r \\)</li>

    <li>
      计算 TD 目标：
      $$
      target = r + \\gamma \\max_{a'} Q(s', a')
      $$
    </li>

    <li>
      更新 Q 值：
      $$
      Q(s, a) \\leftarrow Q(s, a) + \\alpha (target - Q(s, a))
      $$
    </li>

    <li>重复直到 episode 结束</li>
  </ol>

  <h3>阶段三：策略收敛</h3>

  <ul>
    <li>\\( \\epsilon \\) 逐渐衰减（例如 0.1 → 0.01）</li>
    <li>Q 值逐渐稳定</li>
    <li>路径趋向最优解</li>
  </ul>

  <h3>阶段四：测试阶段（Test Mode）</h3>

  <ol>
    <li>关闭探索：\\( \\epsilon = 0 \\)</li>
    <li>始终选择 \\( \\arg\\max_a Q(s, a) \\)</li>
    <li>智能体按最优策略执行</li>
    <li>不再更新 Q 表</li>
  </ol>

  <h3>测试阶段策略行为</h3>

  <p>
    在测试模式中，智能体完全依赖已学习策略：
  </p>

  <p>
    $$
    a = \\arg\\max_a Q(s, a)
    $$
  </p>
`;

        window.MathJax.typesetPromise();
        const tooltip = document.getElementById("maze_tooltip");

        document.addEventListener("mousemove", (e) => {
            const node = e.target.closest(".flow-node");

            if (!node) {
                tooltip.style.display = "none";
                return;
            }

            const text = node.dataset.info;

            tooltip.innerHTML = text;

            tooltip.style.left = (e.pageX + 12) + "px";
            tooltip.style.top = (e.pageY + 12) + "px";

            tooltip.style.display = "block";
        });
    </script>

</body>

</html>
