<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/ink-theme.css" />
    <title>Maze RL Environment</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- <script type="module" src="/src/envs/maze/maze.js"></script> -->
    <style>
        body {
            display: flex;
            overflow-x: auto;
            overflow-y: auto;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            padding: 24px;
        }

        #show {
            flex: 1;
            display: flex;
            width: 100%;
            gap: 24px;
            position: relative;
            padding: 24px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(12px);
        }

        #maze_info {
            position: absolute;
            top: 30px;
            left: 26px;
            font-size: 18px;
            color: var(--gold);
            letter-spacing: 0.04em;
        }

        #game {
            min-height: 800px;
            padding: 80px 20px 24px;
            display: grid;
            grid-template-columns: minmax(180px, 240px) minmax(0, 1fr);
            align-items: center;
            flex: 1;
            position: relative;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.52);
            border: 1px solid rgba(60, 70, 60, 0.06);
            overflow: auto;
        }

        #game canvas {
            grid-column: 2;
            justify-self: center;
            max-width: 100%;
            width: auto !important;
            height: auto !important;
            display: block;
        }

        #maze_tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.94);
            color: var(--ink-text);
            padding: 10px 12px;
            border-radius: 12px;
            pointer-events: none;
            display: none;
            max-width: 400px;
            max-height: 300px;
            z-index: 999;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        #controls {
            width: 316px;
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(12px);
        }

        #maze_explainer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 18px;
            margin-top: 18px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
        }

        #maze_explainer_text {
            width: 70%;
            font-size: 20px;
            color: var(--ink-text-soft);
        }

        #QTable {
            position: absolute;
            left: 10px;
            top: 80px;
            background: rgba(255, 255, 255, 0.88);
            color: var(--ink-text);
            border-radius: 16px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(6px);
        }

        #maze_formula {
            position: absolute;
            left: 10px;
            top: 10px;
            background: rgba(255, 255, 255, 0.88);
            color: var(--ink-text);
            border-radius: 16px;
            padding: 6px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(6px);
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .maze_v {
            position: absolute;
            left: 10px;
            background: rgba(255, 255, 255, 0.88);
            color: var(--jade);
            width: 80px;
            border-radius: 14px;
            padding: 6px;
            font-size: 16px;
            border: 1px solid rgba(60, 70, 60, 0.08);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
        }

        #cfgQagent_s {
            top: 300px;
        }

        #cfgQagent_a {
            top: 340px;
        }

        #cfgQagent_r {
            top: 380px;
        }

        #cfgQagent_qs {
            top: 420px;
        }

        #QTable table {
            border-collapse: collapse;
        }

        #QTable th,
        #QTable td {
            padding: 6px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        #QTable th {
            color: var(--jade);
            font-weight: 600;
        }

        #QTable td {
            font-family: "Consolas", monospace;
            min-width: 70px;
        }

        /* hover */
        #QTable tr:hover td {
            background: rgba(95, 158, 160, 0.05);
        }

        #QTable tr:first-child th {
            border-bottom: 2px solid rgba(95, 158, 160, 0.25);
        }

        button {
            width: 100%;
        }

        .step-container {
            margin: 12px 0;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(60, 70, 60, 0.08);
        }

        .step-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--ink-text);
        }

        .step-flow {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .step-node {
            position: relative;
            padding: 8px 12px;
            margin: 6px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--ink-text-muted);
            font-size: 13px;
            transition: 0.3s;
            border: 1px solid rgba(60, 70, 60, 0.08);
        }

        .step-node.active {
            background: rgba(95, 158, 160, 0.14);
            color: var(--jade);
            transform: scale(1.05);
        }

        .step-node::after {
            content: "";
            position: absolute;
            top: 50%;
            right: -18px;
            width: 18px;
            height: 2px;
            background: repeating-linear-gradient(90deg,
                    rgba(104, 113, 109, 0.45) 0px,
                    rgba(104, 113, 109, 0.45) 4px,
                    transparent 4px,
                    transparent 8px);
            animation: flow 0.8s linear infinite;
        }

        .step-node:last-child::after {
            display: none;
        }

        .flow {
            margin: 12px 0;
            padding: 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid rgba(60, 70, 60, 0.08);
        }

        .flow-title {
            color: var(--ink-text);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .flow-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .flow-node {
            position: relative;
            padding: 8px 12px;
            margin-right: 28px;
            border-radius: 12px;
            font-size: 13px;
            color: var(--ink-text-muted);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(60, 70, 60, 0.08);
            transition: 0.3s;
        }

        .flow-node.active {
            color: var(--jade);
            background: rgba(95, 158, 160, 0.14);
            box-shadow: 0 8px 18px rgba(95, 158, 160, 0.12);
            transform: scale(1.05);
        }

        .flow-node.done {
            color: var(--ink-text);
            background: rgba(95, 158, 160, 0.08);
        }

        .flow-node::after {
            content: ">>>>>";

            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);

            font-size: 12px;
            letter-spacing: 2px;
            color: rgba(104, 113, 109, 0.22);
        }

        .flow-node.active::after {
            color: var(--jade);
            animation: flowMove 0.8s linear infinite;
        }

        @keyframes flowMove {
            0% {
                opacity: 0.2;
                transform: translateY(-50%) translateX(0);
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.2;
                transform: translateY(-50%) translateX(6px);
            }
        }

        /* 最后一个没有箭头 */
        .flow-node:last-child::after {
            display: none;
        }

        @keyframes flow {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 16px 0;
            }
        }

        .cfgRow {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.76);
            border: 1px solid rgba(60, 70, 60, 0.08);
            color: var(--ink-text-soft);
        }

        .cfgRow label {
            font-size: 13px;
            color: var(--ink-text-soft);
        }

        #graph {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-top: 18px;
        }

        #graph-container {
            width: min(1180px, 100%);
            min-height: 600px;
        }

        @media (max-width: 1180px) {
            #show {
                flex-direction: column;
            }

            #controls {
                width: 100%;
            }

            #maze_explainer_text {
                width: 100%;
            }

            #game {
                grid-template-columns: minmax(140px, 200px) minmax(0, 1fr);
            }
        }
    </style>
</head>

<body>
    <div id="show">
        <div id="game">
            <div id="maze_info">
                <span id="currentEpisode">episode: 0</span>

            </div>
            <table id="QTable"></table>
            <span id="maze_formula"></span>
            <span class="maze_v" id="cfgQagent_s">s: 0,0</span>
            <span class="maze_v" id="cfgQagent_a">a: 0</span>
            <span class="maze_v" id="cfgQagent_r">r: 0</span>
            <span class="maze_v" id="cfgQagent_qs">s': 0,0</span>
            <span id="maze_tooltip"></span>

        </div>

        <div id="controls">
            <button id="resetBtn">重置所有</button>
            <button id="resetAgentBtn">重置智能体</button>
            <button id="fresh">刷新页面/刷新地图</button>

            <button id="trainBtn">训练</button>
            <button id="stepTrainBtn">训练一轮</button>
            <button id="stopBtn">停止训练</button>
            <button id="stepBtn">下一步</button>
            <button id="testBtn">测试</button>

            <button id="debugBtn">打印Q表</button>
            <button id="restoreBtn">恢复默认设置</button>

            <div class="cfgRow">
                <label>显示训练过程动画</label>
                <input type="checkbox" id="cfgRenderTrain" checked />
            </div>

            <div class="cfgRow">
                <label>步进时更新Q表</label>
                <input type="checkbox" id="cfgStepMode" />
            </div>

            <div class="cfgRow">
                <label>流型渲染</label>
                <input type="checkbox" id="cfgHighRender" />
            </div>

            <div class="cfgRow">
                <label>显示路径</label>
                <input type="checkbox" id="cfgShowPath" />
            </div>

            <div class="cfgRow">
                <label>最大训练轮数</label>
                <input type="number" id="cfgEpisodes" value="150" />
            </div>

            <div class="cfgRow">
                <label>每轮最大步数</label>
                <input type="number" id="cfgMaxSteps" value="400" />
            </div>

            <div class="cfgRow">
                <label>渲染速度（ms/步）</label>
                <input type="number" id="cfgRenderSpeed" value="10" />
            </div>

            <div class="cfgRow">
                <label>快速渲染间隔（轮）</label>
                <input type="number" id="cfgEpRenderInterval" value="20" />
            </div>

            <div class="cfgRow">
                <label>迷宫列数(必须奇数)</label>
                <input type="number" id="cfgCols" value="21" />
            </div>

            <div class="cfgRow">
                <label>迷宫行数(必须奇数)</label>
                <input type="number" id="cfgRows" value="21" />
            </div>

            <div class="cfgRow">
                <label>α 学习率</label>
                <input type="number" step="0.01" id="cfgAlpha" value="0.1" />
            </div>

            <div class="cfgRow">
                <label>γ 折扣因子</label>
                <input type="number" step="0.01" id="cfgGamma" value="0.95" />
            </div>

            <div class="cfgRow">
                <label>ε 探索因子</label>
                <input type="number" step="0.01" id="cfgEpsilon" value="0.1" />
            </div>

        </div>


    </div>
    <div id="maze_explainer">
        <div id="maze_steps">
            <div id="maze_trainSteps" class="step-container"></div>
            <div id="maze_testSteps" class="step-container"></div>
        </div>
        <div id="maze_explainer_text">

        </div>
    </div>
    <div id="graph">
        <div id="graph-container"></div>
    </div>
    <div id="episode-viewer-root-maze"></div>

    <script type="module">
        import {
            reset, train, test, SingleStep, debug, resetAgent, fresh, applyConfig, stepTrainEpisode, config, stopTrain,
            restore, watch
        } from "/src/envs/maze/maze.js";
        import { setStep } from "/src/envs/maze/steps.js";

        document.getElementById('resetBtn').addEventListener('click', reset);
        document.getElementById('trainBtn').addEventListener('click', train);
        document.getElementById('testBtn').addEventListener('click', test);
        document.getElementById('stepBtn').addEventListener('click', SingleStep);
        document.getElementById('debugBtn').addEventListener('click', debug);

        document.getElementById('resetAgentBtn').addEventListener('click', resetAgent);
        document.getElementById('fresh').addEventListener('click', fresh);
        document.getElementById('stepTrainBtn').addEventListener('click', stepTrainEpisode);
        document.getElementById('stopBtn').addEventListener('click', stopTrain);
        document.getElementById('restoreBtn').addEventListener('click', restore);

        const episodeEl = document.getElementById("currentEpisode");

        function updateViewConfig() {
            document.getElementById('cfgRenderTrain').checked = config.renderTrain;
            document.getElementById('cfgStepMode').checked = config.stepMode;
            document.getElementById('cfgHighRender').checked = config.high_render;
            document.getElementById('cfgShowPath').checked = config.draw_current_path || config.draw_paths;
            document.getElementById('cfgEpisodes').value = config.trainEpisodes;
            document.getElementById('cfgMaxSteps').value = config.maxSteps;
            document.getElementById('cfgRenderSpeed').value = config.renderSpeed;
            document.getElementById('cfgCols').value = config.cols;
            document.getElementById('cfgRows').value = config.rows;
            document.getElementById('cfgAlpha').value = config.alpha;
            document.getElementById('cfgGamma').value = config.gamma;
            document.getElementById('cfgEpsilon').value = config.epsilon;
            document.getElementById("currentEpisode").textContent = `episode: ${config.currentEpisode}`;
        }

        watch("currentEpisode", (val) => {
            episodeEl.textContent = `episode: ${val}`;
        });
        watch("Qagent_s", (val) => {
            document.getElementById("cfgQagent_s").textContent = `s: ${val}`;
        });
        watch("Qagent_a", (val) => {
            document.getElementById("cfgQagent_a").textContent = `a: ${val}`;
        });
        watch("Qagent_r", (val) => {
            document.getElementById("cfgQagent_r").textContent = `r: ${val.toFixed(3)}`;
        });
        watch("Qagent_qs", (val) => {
            document.getElementById("cfgQagent_qs").textContent = `s': ${val}`;
        });

        updateViewConfig();
        applyConfig();

        const explainerEl = document.getElementById("maze_explainer_text");
        const formulaEl = document.getElementById("maze_formula");
        formulaEl.innerHTML = `
    $$Q(s, a)=Q(s, a)\\alpha \\Big[ r + \\gamma \\max_{a'} Q(s', a') - Q(s, a) \\Big]$$
`;

        explainerEl.innerHTML = `
  <h2>Q-Learning 强化学习算法</h2>

  <p>
    Q-Learning 是一种经典的 <b>无模型（Model-Free）强化学习算法</b>，
    属于 <b>时序差分学习（Temporal Difference Learning）</b>，
    通过学习 <b>状态-动作价值函数 Q(s, a)</b> 来寻找最优策略。
  </p>

  <h3>一、算法核心思想</h3>

  <p>
    在环境中，智能体通过不断与环境交互：
  </p>

  <ul>
    <li>观察当前状态 \\( s \\)</li>
    <li>选择动作 \\( a \\)</li>
    <li>获得奖励 \\( r \\)</li>
    <li>转移到新状态 \\( s' \\)</li>
  </ul>

  <p>
    并通过不断更新 Q 值，使得长期回报最大化。
  </p>

  <h3>二、Q-learning 更新公式</h3>

  <p>
   $$Q(s, a) \\leftarrow Q(s, a) + \\alpha \\Big[ r + \\gamma \\max_{a'} Q(s', a') - Q(s, a) \\Big]$$
  </p>

  <h3>三、参数解释</h3>

  <ul>
    <li><b>Q(s, a)</b>：状态-动作价值函数</li>
    <li><b>\\(\\alpha\\)</b>：学习率（learning rate）</li>
    <li><b>\\(\\gamma\\)</b>：折扣因子（discount factor）</li>
    <li><b>r</b>：即时奖励</li>
    <li><b>\\(s'\\)</b>：下一状态</li>
    <li><b>\\(\\max_{a'} Q(s', a')\\)</b>：下一状态的最优预期收益</li>
  </ul>

  <h3>四、算法特征</h3>

  <ul>
    <li>✔ 无需环境模型（Model-Free）</li>
    <li>✔ 离线/在线均可学习</li>
    <li>✔ 收敛到最优策略（在满足条件下）</li>
    <li>✔ 适用于离散状态空间</li>
    <li>⚠ 不适合超大/连续状态空间（需要 DQN）</li>
  </ul>

  <h3>五、适用场景</h3>

  <ul>
    <li>迷宫路径搜索（当前项目）</li>
    <li>棋类游戏策略学习</li>
    <li>简单控制问题（GridWorld）</li>
  </ul>

  <hr />

  <h2>在当前 Maze 环境中的训练流程</h2>

  <h3>阶段一：初始化</h3>

  <ol>
    <li>初始化 Q 表 \\( Q(s, a) = 0 \\)</li>
    <li>设定学习率 \\( \\alpha \\)、折扣因子 \\( \\gamma \\)</li>
    <li>设定探索率 \\( \\epsilon \\)（epsilon-greedy）</li>
    <li>重置环境（reset agent position）</li>
  </ol>

  <h3>阶段二：训练过程（Episode Loop）</h3>

  <ol>
    <li>获取当前状态 \\( s \\)</li>

    <li>
      <b>ε-greedy 选择动作：</b><br/>
      - 以 \\( \\epsilon \\) 概率随机选择动作（探索）<br/>
      - 以 \\( 1 - \\epsilon \\) 概率选择
      \\( \\arg\\max_a Q(s, a) \\)（利用）
    </li>

    <li>执行动作 \\( a \\)，进入新状态 \\( s' \\)</li>

    <li>获得奖励 \\( r \\)</li>

    <li>
      计算 TD 目标：
      $$
      target = r + \\gamma \\max_{a'} Q(s', a')
      $$
    </li>

    <li>
      更新 Q 值：
      $$
      Q(s, a) \\leftarrow Q(s, a) + \\alpha (target - Q(s, a))
      $$
    </li>

    <li>重复直到 episode 结束</li>
  </ol>

  <h3>阶段三：策略收敛</h3>

  <ul>
    <li>\\( \\epsilon \\) 逐渐衰减（例如 0.1 → 0.01）</li>
    <li>Q 值逐渐稳定</li>
    <li>路径趋向最优解</li>
  </ul>

  <h3>阶段四：测试阶段（Test Mode）</h3>

  <ol>
    <li>关闭探索：\\( \\epsilon = 0 \\)</li>
    <li>始终选择 \\( \\arg\\max_a Q(s, a) \\)</li>
    <li>智能体按最优策略执行</li>
    <li>不再更新 Q 表</li>
  </ol>

  <h3>测试阶段策略行为</h3>

  <p>
    在测试模式中，智能体完全依赖已学习策略：
  </p>

  <p>
    $$
    a = \\arg\\max_a Q(s, a)
    $$
  </p>
`;

        window.MathJax.typesetPromise();

        setStep("train", 0);
        setStep("train", 1);
        setStep("test", 0);

    </script>

</body>

</html>
