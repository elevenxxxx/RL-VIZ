<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Chinese Chess RL Environment</title>
<script type="module" src="./main.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
        }

        #game {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f2d7a0;
        }

        #controls {
            width: 200px;
            padding: 10px;
        }

        canvas {
            background: #f7e1b5;
            border: 3px solid #333;
        }

        button {
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div id="game">
        <canvas id="board" width="600" height="670"></canvas>
    </div>

    <div id="controls">
        <button onclick="reset()">重置</button>
        <button id="autoplay-btn" onclick="autoplay()">开始对弈</button>
    </div>
<script>
    
</script>

</body>

</html>
