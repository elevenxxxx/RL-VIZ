<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/main.js"></script>
<title>RL可视化</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* 左侧导航栏 */
  .sidebar {
    width: 200px;
    background-color: #24292e;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: width 0.3s;
    overflow: hidden;
  }

  .github-icon {
    margin: 10px 0;
    width: 40px;
    height: 40px;
    cursor: pointer;
  }

  /* 导航项 */
  .nav-item {
    position: relative;
    width: 100%;
    padding: 15px;
    text-align: center; /* 收缩时图标居中 */
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .nav-item:hover {
    background-color: #444c56;
  }

  .nav-icon {
    width: 24px;
    height: 24px;
    display: block;
  }

  .nav-text {
    text-align: left;
  }

  .sidebar:hover .nav-text {
    opacity: 1;
  }

  /* 右侧内容区 */
  .content {
    flex: 1;
    background-color: #f6f8fa;
    overflow: hidden;
  }

</style>
</head>
<body>
<div id="app"></div>
<div class="sidebar">
  <a href="https://github.com/KKTQawa/RL-VIZ" target="_blank">
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="github-icon" alt="GitHub">
  </a>

<div id="chessNav" class="nav-item">
  <img src="https://cdn-icons-png.flaticon.com/512/1995/1995572.png" class="nav-icon">
  <span class="nav-text">Chinese Chess</span>
</div>

</div>

<div class="content">
  <iframe id="mainFrame" src="" style="width:100%;height:100%;border:none;"></iframe>

</div>
<script  type="module">
import { showContent } from "./src/main.js";
  document.getElementById('chessNav').addEventListener('click', () => {
    showContent('/src/envs/chess.html');
  });
  
  // 默认加载 chess.html
  //showContent('/src/envs/chess.html');
</script>

</body>
</html>
