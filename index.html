<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/ink-theme.css" />
    <script type="module" src="./src/main.js"></script>
<title>RL Visualization Lab</title>
<style>
  :root {
    --sidebar-width: 288px;
    --sidebar-visible-width: 288px;
    --splitter-width: 14px;
  }

  body {
    display: flex;
    height: 100vh;
    overflow: hidden;
    padding: 14px;
    gap: 12px;
  }

  .sidebar {
    width: var(--sidebar-width);
    min-width: 220px;
    max-width: 460px;
    padding: 26px 22px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    background: var(--ink-panel);
    border: 1px solid var(--ink-border);
    border-radius: 28px;
    box-shadow: var(--shadow-soft);
    backdrop-filter: blur(12px);
    box-sizing: border-box;
    overflow: hidden;
    transition: width 220ms ease, padding 220ms ease, opacity 220ms ease, transform 220ms ease;
  }

  .brand {
    padding: 6px 6px 16px;
    border-radius: 22px;
  }

  .brand-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .brand-badge {
    width: 56px;
    height: 56px;
    border-radius: 20px;
    display: grid;
    place-items: center;
    background: rgba(93, 207, 201, 0.12);
    border: 1px solid var(--ink-border);
    color: var(--jade);
    font-size: 22px;
    font-weight: 700;
  }

  .brand-title {
    margin: 0;
    font-size: 28px;
    line-height: 1.1;
    color: var(--ink-heading-primary);
    font-weight: 700;
  }

  .brand-subtitle {
    margin: 0;
    color: var(--ink-copy);
    font-size: 13px;
    line-height: 1.6;
  }

  .brand-meta {
    display: grid;
    gap: 8px;
    margin-top: 14px;
    padding-top: 16px;
    border-top: 1px solid var(--ink-border);
  }

  .sidebar-label {
    margin: 4px 4px 0;
    color: var(--ink-copy-soft);
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .nav-group {
    display: grid;
    gap: 10px;
  }

  .nav-item {
    position: relative;
    width: 100%;
    padding: 16px 18px 16px 22px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 14px;
    color: var(--ink-text-soft);
    border-radius: 20px;
    border: 1px solid rgba(108, 214, 203, 0.14);
    background: rgba(10, 58, 65, 0.56);
    transition:
      transform 300ms ease,
      border-color 300ms ease,
      background 300ms ease,
      color 300ms ease,
      box-shadow 300ms ease;
  }

  .nav-item:hover {
    transform: translateY(-1px);
    color: var(--ink-text);
    border-color: var(--ink-border-strong);
    background: rgba(12, 70, 78, 0.82);
    box-shadow: var(--shadow-soft);
  }

  .nav-icon {
    width: 22px;
    height: 22px;
    display: block;
    opacity: 0.92;
    filter: grayscale(0.2) brightness(1.18) contrast(0.9);
  }

  .nav-text {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .nav-text strong {
    font-size: 15px;
    font-weight: 600;
  }

  .nav-text span {
    font-size: 12px;
    color: var(--ink-copy-soft);
  }

  .nav-item.active {
    color: var(--ink-text);
    border-color: var(--ink-border-strong);
    background: rgba(93, 207, 201, 0.18);
    box-shadow: var(--shadow-lift);
  }

  .nav-item.active::before {
    content: "";
    position: absolute;
    left: 0;
    top: 10px;
    bottom: 10px;
    width: 4px;
    border-radius: 999px;
    background: var(--jade);
  }

  .content {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }

  .splitter {
    width: var(--splitter-width);
    flex: 0 0 var(--splitter-width);
    position: relative;
    cursor: col-resize;
    user-select: none;
    touch-action: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .splitter::before {
    content: "";
    position: absolute;
    top: 14px;
    bottom: 14px;
    left: 50%;
    width: 2px;
    transform: translateX(-50%);
    border-radius: 999px;
    background: rgba(108, 214, 203, 0.3);
    transition: background 180ms ease, box-shadow 180ms ease;
  }

  .splitter:hover::before,
  .splitter.dragging::before {
    background: rgba(108, 214, 203, 0.72);
    box-shadow: 0 0 0 4px rgba(108, 214, 203, 0.16);
  }

  .splitter-toggle {
    position: relative;
    z-index: 1;
    width: 28px;
    height: 56px;
    border: 1px solid var(--ink-border);
    border-radius: 999px;
    background: rgba(10, 58, 65, 0.88);
    color: var(--ink-text-muted);
    box-shadow: var(--shadow-soft);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: transform 180ms ease, color 180ms ease, background 180ms ease;
  }

  .splitter-toggle:hover {
    color: var(--jade);
    background: rgba(93, 207, 201, 0.18);
    transform: scale(1.03);
  }

  .splitter-toggle span {
    font-size: 18px;
    line-height: 1;
    transform: translateX(1px);
  }

  body.sidebar-collapsed {
    --sidebar-width: 0px;
    --splitter-width: 36px;
  }

  body.sidebar-collapsed .sidebar {
    min-width: 0;
    padding-left: 0;
    padding-right: 0;
    border-color: transparent;
    box-shadow: none;
    opacity: 0;
    transform: translateX(-16px);
    pointer-events: none;
  }

  body.sidebar-collapsed .splitter {
    cursor: default;
  }

  body.sidebar-collapsed .splitter::before {
    left: 10px;
    width: 1px;
    background: rgba(108, 214, 203, 0.3);
    box-shadow: none;
  }

  body.sidebar-collapsed .splitter-toggle span {
    transform: translateX(0);
  }

  .content-shell {
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 28px;
    border: 1px solid var(--ink-border);
    box-shadow: var(--shadow-soft);
    background: rgba(8, 47, 53, 0.7);
    backdrop-filter: blur(12px);
  }

  #mainFrame {
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  @media (max-width: 900px) {
    body {
      flex-direction: column;
      height: auto;
      min-height: 100vh;
      overflow: auto;
    }

    .sidebar {
      width: 100%;
      max-width: none;
      min-width: 0;
    }

    .splitter {
      display: none;
    }

    .content {
      min-height: 0;
    }

    .content-shell {
      min-height: calc(100vh - 220px);
    }
  }

</style>
</head>
<body>
<div id="app"></div>
<div class="sidebar">
  <div class="brand">
    <div class="brand-top">
      <div class="brand-badge">RL</div>
      <div>
        <h1 class="brand-title">RL Visualization Lab</h1>
        <p class="brand-subtitle">Training curves </p>
      </div>
    </div>
    <div class="brand-meta">
      <p class="brand-subtitle"> - Training progress</p>
      <p class="brand-subtitle"> - Reward trends</p>
      <p class="brand-subtitle"> - Policy quality & learning stability</p>
    </div>
  </div>

  <div class="sidebar-label">Navigation</div>
  <div class="nav-group">
    <div id="chessNav" class="nav-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1995/1995572.png" class="nav-icon" alt="Chinese Chess">
      <span class="nav-text"><strong>Chinese Chess</strong><span>PPO diagnostics</span></span>
    </div>
    <div id="mazeNav" class="nav-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1995/1995572.png" class="nav-icon" alt="Maze">
      <span class="nav-text"><strong>Maze</strong><span>Q-learning diagnostics</span></span>
    </div>
    <div id="mazeCompareNav" class="nav-item">
      <img src="https://cdn-icons-png.flaticon.com/512/1995/1995572.png" class="nav-icon" alt="Maze Compare">
      <span class="nav-text"><strong>迷宫对比</strong><span>Q-learning 与 PPO</span></span>
    </div>
  </div>

  <a href="https://github.com/KKTQawa/RL-VIZ" target="_blank" class="nav-item">
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="nav-icon" alt="GitHub">
    <span class="nav-text"><strong>Project Repo</strong><span>Source & collaboration</span></span>
  </a>
</div>

<div id="sidebarSplitter" class="splitter">
  <button id="sidebarToggle" class="splitter-toggle" type="button" aria-label="隐藏侧边栏" aria-expanded="true">
    <span>‹</span>
  </button>
</div>

<div class="content">
  <div class="content-shell">
    <iframe id="mainFrame" src=""></iframe>
  </div>
</div>
<script  type="module">
import { showContent } from "./src/main.js";
  const root = document.documentElement;
  const body = document.body;
  const splitter = document.getElementById('sidebarSplitter');
  const toggle = document.getElementById('sidebarToggle');
  const sidebar = document.querySelector('.sidebar');
  const navItems = {
    chess: document.getElementById('chessNav'),
    maze: document.getElementById('mazeNav'),
    mazeCompare: document.getElementById('mazeCompareNav'),
  };

  function clampSidebarWidth(width) {
    return Math.min(460, Math.max(220, width));
  }

  function setSidebarWidth(width) {
    const clamped = clampSidebarWidth(width);
    root.style.setProperty('--sidebar-visible-width', `${clamped}px`);
    if (!body.classList.contains('sidebar-collapsed')) {
      root.style.setProperty('--sidebar-width', `${clamped}px`);
    }
  }

  function syncSidebarToggle() {
    const collapsed = body.classList.contains('sidebar-collapsed');
    toggle.setAttribute('aria-expanded', String(!collapsed));
    toggle.setAttribute('aria-label', collapsed ? '展开侧边栏' : '隐藏侧边栏');
    toggle.querySelector('span').textContent = collapsed ? '›' : '‹';
  }

  function collapseSidebar() {
    body.classList.add('sidebar-collapsed');
    root.style.setProperty('--sidebar-width', '0px');
    syncSidebarToggle();
  }

  function expandSidebar() {
    body.classList.remove('sidebar-collapsed');
    const width = getComputedStyle(root).getPropertyValue('--sidebar-visible-width').trim() || '288px';
    root.style.setProperty('--sidebar-width', width);
    syncSidebarToggle();
  }

  let isDragging = false;

  splitter.addEventListener('pointerdown', (event) => {
    if (window.innerWidth <= 900 || event.target === toggle || toggle.contains(event.target)) return;
    isDragging = true;
    if (body.classList.contains('sidebar-collapsed')) {
      expandSidebar();
    }
    splitter.classList.add('dragging');
    splitter.setPointerCapture(event.pointerId);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  splitter.addEventListener('pointermove', (event) => {
    if (!isDragging) return;
    const width = event.clientX - 18;
    setSidebarWidth(width);
  });

  function stopDragging(event) {
    if (!isDragging) return;
    isDragging = false;
    splitter.classList.remove('dragging');
    if (event?.pointerId != null) {
      try {
        splitter.releasePointerCapture(event.pointerId);
      } catch (_) {}
    }
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }

  splitter.addEventListener('pointerup', stopDragging);
  splitter.addEventListener('pointercancel', stopDragging);
  window.addEventListener('blur', () => stopDragging());

  toggle.addEventListener('click', () => {
    if (window.innerWidth <= 900) return;
    if (body.classList.contains('sidebar-collapsed')) {
      expandSidebar();
    } else {
      collapseSidebar();
    }
  });

  window.addEventListener('resize', () => {
    if (window.innerWidth <= 900) {
      body.classList.remove('sidebar-collapsed');
      root.style.setProperty('--sidebar-width', '100%');
    } else if (!body.classList.contains('sidebar-collapsed')) {
      const width = getComputedStyle(root).getPropertyValue('--sidebar-visible-width').trim() || '288px';
      root.style.setProperty('--sidebar-width', width);
    }
    syncSidebarToggle();
  });

  setSidebarWidth(sidebar.getBoundingClientRect().width || 288);
  syncSidebarToggle();

  function setActiveNav(activeKey) {
    Object.entries(navItems).forEach(([key, element]) => {
      element.classList.toggle('active', key === activeKey);
    });
  }

  document.getElementById('chessNav').addEventListener('click', () => {
    let url = './src/pages/chess.html';
    setActiveNav('chess');
    showContent(url);
  });
  document.getElementById('mazeNav').addEventListener('click', () => {
    let url = './src/pages/maze.html';
    setActiveNav('maze');
    showContent(url);
   });
  document.getElementById('mazeCompareNav').addEventListener('click', () => {
    let url = './src/pages/maze_compare.html';
    setActiveNav('mazeCompare');
    showContent(url);
   });
  
  setActiveNav('maze');
  showContent('./src/pages/maze.html');
</script>

</body>
</html>
